# ============================================
# Finance Backend — Application Configuration
# ============================================

spring.application.name=finance-backend

# ---------- Database (H2 — dev default) ----------
spring.datasource.url=jdbc:h2:mem:financedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ---------- JWT ----------
app.jwt.secret=Zk9ydn5uRmluYW5jZUJhY2tlbmRTZWNyZXRLZXlGb3JKVFR0b2tlbkdlbmVyYXRpb24yMDI2
app.jwt.expiration-ms=86400000

# ---------- Swagger / OpenAPI ----------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# ---------- Server ----------
server.port=8080
